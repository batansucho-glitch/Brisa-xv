<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis 15 Años - Brisa</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffffff; /* Fondo Blanco */
            color: #003366; /* Azul Oscuro */
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* Fondo con estrellas y manchas tenues */
        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 51, 102, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            opacity: 0.3;
            z-index: -1;
        }

        .container {
            padding: 50px 20px;
            max-width: 600px;
            margin: auto;
            border: 2px solid #d4af37; /* Borde Dorado */
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4em;
            color: #004080; /* Azul */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2), 0 0 10px rgba(212, 175, 55, 0.5); /* Brillo */
            margin-bottom: 10px;
        }

        .details { font-size: 1.2em; margin: 20px 0; }
        .golden { color: #b8860b; font-weight: bold; }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: #004080;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            margin-top: 20px;
            border: 2px solid #d4af37;
            transition: 0.3s;
        }

        .btn:hover { background: #d4af37; color: #004080; }

        /* Reproductor oculto */
        #music-player { display: none; }
    </style>
</head>
<body>

    <div class="background-overlay"></div>
    <div class="stars"></div>

    <div class="container">
        <p>Mis 15 Años</p>
        <h1>Brisa</h1> <div class="details">
            <p>Te espero para compartir una noche mágica</p>
            <p class="golden">08 de Mayo de 2026</p>
            <p>21:00 Horas</p>
            <p>La Plata, Buenos Aires</p>
        </div>

        <a href="https://wa.me/tu_numero" class="btn">Confirmar Asistencia</a>
        
        <iframe id="music-player" width="0" height="0" src="https://www.youtube.com/embed/QsSffdlYMro?autoplay=1" frameborder="0" allow="autoplay"></iframe>
    </div>

    <script>
        // Intento de reproducción automática (algunos navegadores requieren interacción)
        window.addEventListener('click', () => {
            const player = document.getElementById('music-player');
            player.src += "&autoplay=1";
        }, { once: true });
    </script>
</body>
</html>
